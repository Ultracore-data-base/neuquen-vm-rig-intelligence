name: Daily Neuquen Permit Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * *"  # 08:30 Argentina time approx.

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python crawler.py

      - name: Commit updated data
        run: |
          git config user.name "neuquen-rig-intelligence-bot"
          git config user.email "actions@github.com"
          git add data/*.csv data/*.json || true
          git commit -m "Daily permit pipeline update" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push
